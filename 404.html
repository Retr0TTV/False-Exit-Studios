<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — False Exit Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#050505;color:#c8c4a8;font-family:'Share Tech Mono',monospace;display:grid;place-items:center;overflow:hidden;cursor:crosshair}body:before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.18) 2px,rgba(0,0,0,.18) 4px),radial-gradient(circle at center,rgba(212,200,122,.08),transparent 55%);pointer-events:none}.wrap{text-align:center;padding:2rem;max-width:760px;position:relative}.code{font-family:'Oswald',sans-serif;font-size:clamp(5rem,18vw,13rem);line-height:.8;color:transparent;-webkit-text-stroke:1px rgba(200,196,168,.25);letter-spacing:.08em}.eyebrow{font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:#6b6857;margin-bottom:1.5rem}.title{font-family:'Oswald',sans-serif;font-size:clamp(2.5rem,8vw,5.5rem);text-transform:uppercase;letter-spacing:.08em;margin:.5rem 0}.msg{color:#6b6857;line-height:1.8;margin:1.5rem auto 2rem;max-width:520px}.btn{display:inline-block;border:1px solid rgba(200,196,168,.35);color:#c8c4a8;text-decoration:none;padding:1rem 1.4rem;text-transform:uppercase;letter-spacing:.22em;font-size:11px;transition:.2s}.btn:hover{background:#c8c4a8;color:#050505}.blink{animation:blink 1.1s steps(2,end) infinite}@keyframes blink{50%{opacity:.25}}.bg{position:fixed;inset:-20%;font-family:'Oswald',sans-serif;font-size:14vw;letter-spacing:.08em;color:rgba(200,196,168,.025);transform:rotate(-24deg);white-space:nowrap;z-index:-1}</style>
</head>
<body>
<div class="bg">DON'T LOOK BACK &nbsp; DON'T LOOK BACK &nbsp; DON'T LOOK BACK</div>
<main class="wrap">
  <div class="eyebrow">False Exit Studios</div>
  <div class="code">404</div>
  <h1 class="title">Wrong Exit</h1>
  <p class="msg">You found a place that was not meant to be found. The hallway ends here. Do not turn around.</p>
  <a class="btn" href="/">Return to Safety <span class="blink">_</span></a>
</main>
</body>
</html>
